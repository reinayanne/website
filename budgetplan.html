<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DGC Admin – Budget Finances</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link rel="icon" type="image/png" sizes="64x64" href="adminfavicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --pink:#ff4fa3;
  --pink-light:#ff7bbf;
  --glass-bg:rgba(255,123,191,.18);
  --text-main:#fff;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:url("adminbackground.png") center/cover fixed no-repeat;
  color:var(--text-main);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}

/* LOADER */
#loader{position:fixed;inset:0;background:var(--pink-light);display:flex;align-items:center;justify-content:center;z-index:9999;transition:.4s}
#loader.fade-out{opacity:0;visibility:hidden}
.arc-spinner{width:40px;height:40px;border:4px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.loader-inner{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:16px;
  text-align:center;
}

/* HEADER */
header{
  position:sticky;top:0;z-index:1000;height:70px;
  display:flex;justify-content:space-between;align-items:center;
  padding:0 20px;
  backdrop-filter:blur(18px);
  background:linear-gradient(270deg,#ff4fa3,#ff7bbf,#ffb3d9);
  background-size:400% 400%;
  animation:headerFlow 12s ease infinite;
}
@keyframes headerFlow{0%{background-position:0%}50%{background-position:100%}100%{background-position:0%}}
.header-left{display:flex;align-items:center;gap:12px}
.header-left img{height:44px}
.motto{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600}
.header-icons{display:flex;gap:12px;position:relative}
.header-icons a{
  width:42px;height:42px;
  display:flex;align-items:center;justify-content:center;
  border-radius:14px;color:#fff;text-decoration:none;
  transition:.3s;position:relative;
}
.header-icons a:hover{transform:translateY(-2px) scale(1.05);box-shadow:0 0 14px rgba(255,79,163,.8)}

/* CONTAINER */
.container{
  max-width:1500px;margin:20px auto 60px;padding:20px;
  background:var(--glass-bg);backdrop-filter:blur(18px);
  border-radius:24px;border:1px solid rgba(255,255,255,.35);
}

/* FINANCES CONTENT */
.finances-wrapper{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

@media(max-width:1024px){
  .finances-wrapper{grid-template-columns:1fr}
}

/* CARD */
.card {
  background:rgba(255,255,255,.35);
  border-radius:20px;
  padding:25px;
  color:#7a2f4d;
}
.card h2 {
  font-size:1.4em;
  margin-bottom:20px;
  border-bottom:3px solid #ff4fa3;
  padding-bottom:10px;
  display:flex;
  align-items:center;
  gap:10px;
}

/* INPUT */
.input-group {
  margin-bottom:20px;
}
.input-group label {
  display:block;
  margin-bottom:8px;
  font-weight:600;
  font-size:1.1em;
}
.input-group input {
  width:100%;
  padding:15px;
  border:2px solid rgba(255,79,163,.3);
  border-radius:14px;
  font-size:1.2em;
  background:rgba(255,255,255,.8);
  color:#7a2f4d;
  transition:border-color 0.3s;
}
.input-group input:focus {
  outline:none;
  border-color:#ff4fa3;
  box-shadow:0 0 10px rgba(255,79,163,.3);
}

/* BUDGET DISPLAY */
.budget-display {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));
  gap:15px;
  margin-top:20px;
}
.budget-item {
  padding:25px;
  border-radius:15px;
  text-align:center;
  color:white;
  transition:transform 0.3s;
  box-shadow:0 4px 15px rgba(0,0,0,.15);
}
.budget-item:hover {
  transform:translateY(-5px);
}
.needs { background:linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
.savings { background:linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
.investment { background:linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
.budget-item h3 {
  font-size:1.2em;
  margin-bottom:8px;
  opacity:0.9;
}
.budget-item .percentage {
  font-size:0.9em;
  opacity:0.8;
  margin-bottom:10px;
}
.budget-item .amount {
  font-size:2em;
  font-weight:bold;
}

/* RULES INFO */
.rules-info {
  background:rgba(255,79,163,.15);
  border-left:5px solid #ff4fa3;
  padding:15px;
  border-radius:14px;
  margin-bottom:20px;
}
.rules-info h4 {
  color:#ff4fa3;
  margin-bottom:10px;
}
.rules-info ul {
  list-style:none;
  padding-left:0;
}
.rules-info li {
  padding:5px 0;
  color:#7a2f4d;
}
.rules-info li::before {
  content:"✓ ";
  color:#ff4fa3;
  font-weight:bold;
}

/* BANK SECTION */
.total-balance {
  text-align:center;
  padding:20px;
  background:linear-gradient(135deg, #ff4fa3 0%, #ff7bbf 100%);
  color:white;
  border-radius:15px;
  margin-bottom:20px;
}
.total-balance h3 {
  font-size:1.2em;
  margin-bottom:10px;
}
.total-balance .amount {
  font-size:2.5em;
  font-weight:bold;
}

.bank-card {
  background:rgba(255,255,255,.5);
  border-radius:15px;
  padding:20px;
  margin-bottom:15px;
  border-left:5px solid #ff4fa3;
  box-shadow:0 2px 10px rgba(0,0,0,.1);
}
.bank-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
}
.bank-name {
  font-size:1.3em;
  font-weight:bold;
  color:#7a2f4d;
}
.bank-balance {
  font-size:1.5em;
  color:#ff4fa3;
  font-weight:bold;
}
.bank-actions {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.bank-actions input {
  flex:1;
  min-width:120px;
  padding:10px;
  border:2px solid rgba(255,79,163,.3);
  border-radius:10px;
  font-size:1em;
  background:rgba(255,255,255,.8);
  color:#7a2f4d;
}
.bank-actions input:focus {
  outline:none;
  border-color:#ff4fa3;
}

/* BUTTONS */
.btn {
  padding:10px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:1em;
  font-weight:600;
  transition:all 0.3s;
}
.btn-deposit {
  background:linear-gradient(135deg, #43e97b, #38f9d7);
  color:#fff;
}
.btn-deposit:hover {
  transform:scale(1.05);
  box-shadow:0 4px 15px rgba(67,233,123,.4);
}
.btn-withdraw {
  background:linear-gradient(135deg, #f5576c, #f093fb);
  color:#fff;
}
.btn-withdraw:hover {
  transform:scale(1.05);
  box-shadow:0 4px 15px rgba(245,87,108,.4);
}
.btn-add-bank {
  background:linear-gradient(135deg, #ff4fa3, #ff7bbf);
  color:#fff;
  width:100%;
  padding:15px;
  margin-top:15px;
  font-size:1.1em;
}
.btn-add-bank:hover {
  transform:scale(1.02);
  box-shadow:0 4px 20px rgba(255,79,163,.5);
}
.btn-delete {
  background:#ff6b6b;
  color:#fff;
  padding:5px 12px;
  font-size:0.85em;
}
.btn-delete:hover {
  background:#ff2f2f;
  transform:scale(1.1);
}
.btn-edit {
  background:#ffd93d;
  color:#333;
  padding:5px 12px;
  font-size:0.85em;
}
.btn-edit:hover {
  background:#f5c800;
  transform:scale(1.1);
}

/* ADD BANK FORM */
.add-bank-form {
  display:none;
  margin-top:15px;
  padding:20px;
  background:rgba(255,255,255,.5);
  border-radius:14px;
}
.add-bank-form.active {
  display:block;
  animation:fadeIn 0.3s ease;
}
.form-row {
  display:flex;
  gap:10px;
  margin-bottom:10px;
}
.form-row input {
  flex:1;
  padding:10px;
  border:2px solid rgba(255,79,163,.3);
  border-radius:10px;
  background:rgba(255,255,255,.8);
  color:#7a2f4d;
}
.form-row input:focus {
  outline:none;
  border-color:#ff4fa3;
}

/* TRANSACTION HISTORY */
.transaction-history {
  margin-top:15px;
  max-height:200px;
  overflow-y:auto;
}
.transaction-item {
  display:flex;
  justify-content:space-between;
  padding:8px 12px;
  margin-bottom:5px;
  border-radius:8px;
  font-size:0.9em;
}
.transaction-deposit {
  background:rgba(67,233,123,.2);
  color:#155724;
}
.transaction-withdraw {
  background:rgba(245,87,108,.2);
  color:#721c24;
}

/* EDIT FORM */
.edit-bank-form {
  display:none;
  margin-top:10px;
  padding:15px;
  background:rgba(255,217,61,.3);
  border-radius:10px;
}
.edit-bank-form.active {
  display:block;
}

/* SCROLL */
#scrollBtn{position:fixed;right:20px;bottom:20px;width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#ff4fa3,#ff7bbf);color:#fff;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.3s;z-index:999;box-shadow:0 4px 15px rgba(255,79,163,0.4)}
#scrollBtn.show{opacity:1;pointer-events:auto}

/* ANIMATIONS */
@keyframes fadeIn{
  from{opacity:0;transform:translateY(-10px)}
  to{opacity:1;transform:translateY(0)}
}

/* MOBILE RESPONSIVE */
@media(max-width:768px){
  header{height:60px;padding:0 15px}
  .header-left img{height:36px}
  .motto{font-size:11px}
  .header-icons a{width:36px;height:36px;border-radius:12px}
  .header-icons a i{font-size:14px}
  .container{margin:10px;padding:15px;border-radius:20px}
  .card{padding:15px}
  .budget-display{grid-template-columns:1fr}
  .budget-item .amount{font-size:1.6em}
  .bank-actions{flex-direction:column}
  .form-row{flex-direction:column}
  .total-balance .amount{font-size:1.8em}
}

@media(max-width:480px){
  .container{padding:10px;margin:5px}
  .card{padding:12px}
  .bank-actions input{width:100%}
  .btn{width:100%}
}

/* TOUCH OPTIMIZATIONS */
@media(hover:none){
  .header-icons a:hover{transform:none;box-shadow:none}
  .budget-item:hover{transform:none}
  .btn:hover{transform:none}
}

body{overflow-x:hidden}
</style>
<base target="_blank">
<base target="_blank">
</head>

<body>

<div id="loader">
  <div class="loader-inner">
    <img src="adminlogo.png" width="90">
    <div class="arc-spinner"></div>
  </div>
</div>

<header>
  <div class="header-left">
    <a href="homepage.html"><img src="adminlogo.png"></a>
    <div class="motto" id="motto"></div>
  </div>
  <div class="header-icons">
    <a href="homepage.html" id="homeBtn">
      <i class="fas fa-house"></i>
    </a>
    <a id="musicToggle"><i class="fas fa-music"></i></a>
    <a id="logoutBtn"><i class="fas fa-right-from-bracket"></i></a>
  </div>
</header>

<div class="container">
  <div class="finances-wrapper">

    <!-- BUDGET CALCULATOR -->
    <div class="card">
      <h2><i class="fas fa-calculator"></i> Budget Calculator</h2>

      <div class="rules-info">
        <h4>Budget Allocation Rules:</h4>
        <ul>
          <li>Needs (50%) - Mga bagay na kailangan mo</li>
          <li>Savings (20%) - Ipon para sa future</li>
          <li>Investment (30%) - Para lumago ang pera</li>
        </ul>
      </div>

      <div class="input-group">
        <label for="totalAmount"><i class="fas fa-peso-sign"></i> Enter Total Amount (₱):</label>
        <input type="number" id="totalAmount" placeholder="Halimbawa: 10000" oninput="calculateBudget()">
      </div>

      <div class="budget-display">
        <div class="budget-item needs">
          <h3><i class="fas fa-shopping-cart"></i> Needs</h3>
          <div class="percentage">50%</div>
          <div class="amount" id="needsAmount">₱0.00</div>
        </div>
        <div class="budget-item savings">
          <h3><i class="fas fa-piggy-bank"></i> Savings</h3>
          <div class="percentage">20%</div>
          <div class="amount" id="savingsAmount">₱0.00</div>
        </div>
        <div class="budget-item investment">
          <h3><i class="fas fa-chart-line"></i> Investment</h3>
          <div class="percentage">30%</div>
          <div class="amount" id="investmentAmount">₱0.00</div>
        </div>
      </div>
    </div>

    <!-- BANK ACCOUNTS -->
    <div class="card">
      <h2><i class="fas fa-university"></i> Bank Accounts</h2>

      <div class="total-balance">
        <h3>Total Bank Balance</h3>
        <div class="amount" id="totalBankBalance">₱0.00</div>
      </div>

      <div id="bankList"></div>

      <button class="btn btn-add-bank" onclick="toggleAddBankForm()">
        <i class="fas fa-plus"></i> Add New Bank Account
      </button>

      <div class="add-bank-form" id="addBankForm">
        <h4 style="margin-bottom:15px; color:#7a2f4d;">Add Bank Account</h4>
        <div class="form-row">
          <input type="text" id="newBankName" placeholder="Bank Name (e.g., BDO, BPI, GCash)">
          <input type="number" id="newBankBalance" placeholder="Initial Balance (₱)">
        </div>
        <div class="form-row">
          <button class="btn btn-deposit" onclick="addBank()" style="flex:1;">Add Bank</button>
          <button class="btn btn-withdraw" onclick="toggleAddBankForm()" style="flex:1;">Cancel</button>
        </div>
      </div>
    </div>

  </div>
</div>

<div id="scrollBtn"><i class="fas fa-arrow-up"></i></div>

<audio id="bgMusic" src="coffee.mp3" loop></audio>

<script>
/* LOADER */
const loader=document.getElementById("loader");
window.onload=()=>setTimeout(()=>loader.classList.add("fade-out"),300);

/* RANDOM MOTTO */
const motto=document.getElementById("motto");
const titles=[
 ['fas fa-crown','You are a QUEEN Julie'],
 ['fas fa-heart','I Love you Julie'],
 ['fas fa-bolt','Kaya mo yan Julie']
];
const t=titles[Math.floor(Math.random()*titles.length)];
motto.innerHTML=`<i class="${t[0]}"></i>${t[1]}`;

/* MUSIC */
musicToggle.onclick=()=>{
  bgMusic.paused
    ?(bgMusic.play(),musicToggle.innerHTML='<i class="fas fa-pause"></i>')
    :(bgMusic.pause(),musicToggle.innerHTML='<i class="fas fa-music"></i>');
};

/* SCROLL */
window.addEventListener("scroll",()=>scrollBtn.classList.toggle("show",scrollY>400));
scrollBtn.onclick=()=>scrollTo({top:0,behavior:"smooth"});

/* LOGOUT */
logoutBtn.onclick=()=>{
  if(confirm("Are you sure you want to logout?")){
    window.location.href="login.html";
  }
};

/* BUDGET CALCULATOR */
function calculateBudget() {
  const total = parseFloat(document.getElementById('totalAmount').value) || 0;

  const needs = total * 0.50;
  const savings = total * 0.20;
  const investment = total * 0.30;

  document.getElementById('needsAmount').textContent = formatCurrency(needs);
  document.getElementById('savingsAmount').textContent = formatCurrency(savings);
  document.getElementById('investmentAmount').textContent = formatCurrency(investment);
}

function formatCurrency(amount) {
  return '₱' + amount.toFixed(2).replace(/\d(?=(\d{3})+\.)/g, '$&,');
}

/* BANK ACCOUNTS */
let banks = JSON.parse(localStorage.getItem('budgetBanks')) || [
  { id: 1, name: 'BDO Unibank', balance: 5000, transactions: [] },
  { id: 2, name: 'BPI', balance: 3000, transactions: [] },
  { id: 3, name: 'GCash', balance: 2000, transactions: [] }
];

function saveBanks() {
  localStorage.setItem('budgetBanks', JSON.stringify(banks));
}

function renderBanks() {
  const bankList = document.getElementById('bankList');
  let totalBalance = 0;

  bankList.innerHTML = banks.map(bank => {
    totalBalance += bank.balance;

    const transactionsHtml = bank.transactions.length > 0 
      ? `<div class="transaction-history">
          ${bank.transactions.slice(-5).reverse().map(t => `
            <div class="transaction-item ${t.type}">
              <span>${t.type === 'transaction-deposit' ? '⬆️ Deposit' : '⬇️ Withdraw'}</span>
              <span>${formatCurrency(t.amount)} - ${t.date}</span>
            </div>
          `).join('')}
         </div>`
      : '';

    return `
      <div class="bank-card" id="bank-${bank.id}">
        <div class="bank-header">
          <div>
            <div class="bank-name"><i class="fas fa-landmark"></i> ${bank.name}</div>
            <div style="font-size:0.85em; color:#888; margin-top:5px;">ID: ${bank.id}</div>
          </div>
          <div class="bank-balance">${formatCurrency(bank.balance)}</div>
        </div>
        <div class="bank-actions">
          <input type="number" id="amount-${bank.id}" placeholder="Amount (₱)">
          <button class="btn btn-deposit" onclick="deposit(${bank.id})"><i class="fas fa-arrow-up"></i> Deposit</button>
          <button class="btn btn-withdraw" onclick="withdraw(${bank.id})"><i class="fas fa-arrow-down"></i> Withdraw</button>
          <button class="btn btn-edit" onclick="toggleEditForm(${bank.id})"><i class="fas fa-edit"></i> Edit</button>
          <button class="btn btn-delete" onclick="deleteBank(${bank.id})"><i class="fas fa-trash"></i> Delete</button>
        </div>

        <div class="edit-bank-form" id="edit-form-${bank.id}">
          <h4 style="margin-bottom:10px; color:#7a2f4d;">Edit Bank Name</h4>
          <div class="form-row">
            <input type="text" id="edit-name-${bank.id}" value="${bank.name}" placeholder="New Bank Name">
          </div>
          <div class="form-row">
            <button class="btn btn-deposit" onclick="saveEdit(${bank.id})" style="flex:1;">Save</button>
            <button class="btn btn-withdraw" onclick="toggleEditForm(${bank.id})" style="flex:1;">Cancel</button>
          </div>
        </div>

        ${transactionsHtml}
      </div>
    `;
  }).join('');

  document.getElementById('totalBankBalance').textContent = formatCurrency(totalBalance);
}

function deposit(bankId) {
  const amountInput = document.getElementById(`amount-${bankId}`);
  const amount = parseFloat(amountInput.value);

  if (!amount || amount <= 0) {
    alert('Please enter a valid amount!');
    return;
  }

  const bank = banks.find(b => b.id === bankId);
  if (bank) {
    bank.balance += amount;
    bank.transactions.push({
      type: 'transaction-deposit',
      amount: amount,
      date: new Date().toLocaleString()
    });
    saveBanks();
    renderBanks();
    amountInput.value = '';
    alert(`Successfully deposited ${formatCurrency(amount)} to ${bank.name}`);
  }
}

function withdraw(bankId) {
  const amountInput = document.getElementById(`amount-${bankId}`);
  const amount = parseFloat(amountInput.value);

  if (!amount || amount <= 0) {
    alert('Please enter a valid amount!');
    return;
  }

  const bank = banks.find(b => b.id === bankId);
  if (bank) {
    if (bank.balance < amount) {
      alert('Insufficient balance!');
      return;
    }

    bank.balance -= amount;
    bank.transactions.push({
      type: 'transaction-withdraw',
      amount: amount,
      date: new Date().toLocaleString()
    });
    saveBanks();
    renderBanks();
    amountInput.value = '';
    alert(`Successfully withdrew ${formatCurrency(amount)} from ${bank.name}`);
  }
}

function deleteBank(bankId) {
  if (confirm('Are you sure you want to delete this bank account?')) {
    banks = banks.filter(b => b.id !== bankId);
    saveBanks();
    renderBanks();
  }
}

function toggleAddBankForm() {
  const form = document.getElementById('addBankForm');
  form.classList.toggle('active');
  if (!form.classList.contains('active')) {
    document.getElementById('newBankName').value = '';
    document.getElementById('newBankBalance').value = '';
  }
}

function addBank() {
  const name = document.getElementById('newBankName').value.trim();
  const balance = parseFloat(document.getElementById('newBankBalance').value) || 0;

  if (!name) {
    alert('Please enter a bank name!');
    return;
  }

  const newId = banks.length > 0 ? Math.max(...banks.map(b => b.id)) + 1 : 1;

  banks.push({
    id: newId,
    name: name,
    balance: balance,
    transactions: balance > 0 ? [{
      type: 'transaction-deposit',
      amount: balance,
      date: new Date().toLocaleString()
    }] : []
  });

  saveBanks();
  renderBanks();
  toggleAddBankForm();
  alert(`Bank account "${name}" added successfully!`);
}

function toggleEditForm(bankId) {
  const form = document.getElementById(`edit-form-${bankId}`);
  form.classList.toggle('active');
}

function saveEdit(bankId) {
  const newName = document.getElementById(`edit-name-${bankId}`).value.trim();

  if (!newName) {
    alert('Please enter a bank name!');
    return;
  }

  const bank = banks.find(b => b.id === bankId);
  if (bank) {
    bank.name = newName;
    saveBanks();
    renderBanks();
    alert('Bank name updated successfully!');
  }
}

/* INIT */
renderBanks();
</script>

</body>
</html>
