
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Queen Julie | Dynamic Habit Tracker</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
  --pink: #ff4fa3;
  --pink-light: #ff7bbf;
  --glass-bg: rgba(255,255,255,0.12);
  --text-main: #fff;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
  background:url('adminbackground.png') center/cover no-repeat fixed;
  color:#fff;
  min-height:100vh;
  overflow-x:hidden;
}

/* HEADER */
header{
  position:sticky; top:0; z-index:1000;
  display:flex; justify-content:space-between; align-items:center;
  padding:18px 26px;
  backdrop-filter:blur(18px);
  background: linear-gradient(270deg,#ff4fa3,#ff7bbf,#ffb3d9);
  background-size:400% 400%;
  animation:flow 12s ease infinite;
}
@keyframes flow{
  0%{background-position:0%}
  50%{background-position:100%}
  100%{background-position:0%}
}

.header-left{display:flex;align-items:center;gap:14px;}
.header-left img{height:46px;}

.motto{
  font-size:18px;font-weight:600;font-style:italic;
  display:flex;align-items:center;gap:12px;
}

.header-icons i{
  font-size:22px;margin-left:20px;color:#fff;
  cursor:pointer;transition:.3s;
}
.header-icons i:hover{
  color:#ff69b4;
  text-shadow:0 0 8px #ff69b4;
}

/* NEW VERTICAL CONTROL PANEL - Desktop side-by-side layout */
.control-panel-container {
  display: flex;
  flex-direction: row; /* Horizontal on desktop - side by side */
  gap: 20px;
  background: var(--glass-bg);
  backdrop-filter: blur(12px);
  padding: 20px;
  margin: 30px auto;
  border-radius: 20px;
  max-width: 1400px;
  align-items: flex-start;
  justify-content: space-between;
}

/* LEFT section: Calendar + Chibi side by side */
.control-left {
  display: flex;
  flex-direction: row; /* Side by side */
  align-items: flex-start;
  gap: 15px;
  min-width: 280px;
}

/* Calendar wrapper */
.calendar-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Chibi image styling - Now beside calendar */
.chibi-image {
  width: 180px;
  height: auto;
  border-radius: 15px;
  object-fit: contain;
}

/* MIDDLE section: Title, Time ONLY (centered) */
.control-middle {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 15px;
  flex: 1;
  min-width: 250px;
  padding-top: 20px;
}

/* RIGHT section: Buttons + Progress side by side */
.control-right {
  display: flex;
  flex-direction: row; /* Buttons and Progress side by side */
  align-items: flex-start;
  gap: 20px;
  min-width: 400px;
}

/* Buttons container - stacked vertically */
.buttons-container {
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-width: 180px;
}

/* Mini Calendar Styles */
.calendar{
  display:grid;
  grid-template-columns: repeat(7, 30px);
  gap:6px;
  text-align:center;
}

.calendar-day{
  width:30px;height:30px;
  display:flex;justify-content:center;align-items:center;
  border-radius:6px;cursor:pointer;
}

.calendar-day.today{
  background:var(--pink);
  font-weight:bold;
}

.weekday-header{
  font-weight:700;
  color:#ffb3d9;
}

/* Routine Tracker Title */
.routine-title {
  font-size: 28px;
  font-weight: 700;
  text-align: center;
  text-shadow: 0 0 10px #ff69b4;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
  margin-bottom: 5px;
}

/* Digital Clock */
#digitalClock{
  font-size: 24px;
  font-weight: 600;
  color: #fff;
  text-shadow: 0 0 8px rgba(255, 79, 163, 0.8);
  padding: 10px 20px;
  background: rgba(255, 79, 163, 0.2);
  border-radius: 12px;
  border: 1px solid rgba(255, 79, 163, 0.4);
}

/* Button Groups - now in right section */
.button-group {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 100%;
}

.monthly-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  width: 100%;
}

.dgc-btn{
  background:linear-gradient(135deg,#ff4fa3,#ff7bbf);
  color:#fff;
  border:none;
  padding:10px 20px;
  border-radius:18px;
  cursor:pointer;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
  font-weight: 600;
  transition: all 0.3s;
  white-space: nowrap;
  width: 100%;
}

.dgc-btn:hover{
  background:#fff;
  color:#ff4fa3;
  border:2px solid #ff4fa3;
}

.dgc-btn.active {
  background: #fff;
  color: #ff4fa3;
  border: 2px solid #ff4fa3;
}

/* Month Dropdown */
#monthSelect{
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;
  background: linear-gradient(135deg,#ff4fa3,#ff7bbf);
  color:#fff;
  border:2px solid #ff7bbf;
  padding:8px 35px 8px 15px;
  border-radius:18px;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
  font-size:13px;
  font-weight: 600;
  cursor:pointer;
  transition:.3s;
  box-shadow:0 0 10px rgba(255,105,180,0.4);
  width: 100%;
}

#monthSelect:hover{
  background:#fff;
  color:#ff4fa3;
  border:2px solid #ff4fa3;
  box-shadow:0 0 15px #ff69b4;
}

#monthSelect:focus{
  outline:none;
  box-shadow:0 0 20px #ff69b4;
}

#monthSelect{
  background-image:
    linear-gradient(135deg,#ff4fa3,#ff7bbf),
    url("data:image/svg+xml;utf8,<svg fill='white' height='20' viewBox='0 0 24 24' width='20' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/></svg>");
  background-repeat:no-repeat,no-repeat;
  background-position:0 0, right 10px center;
  background-size:100% 100%,16px;
}

/* Progress Chart Container - Same size as mini calendar */
.progress-container {
  width: 200px; /* Fixed width to match mini calendar */
  height: 200px; /* Fixed height to match mini calendar */
  background: rgba(255, 255, 255, 0.1);
  border-radius: 15px;
  padding: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0; /* Prevent shrinking */
}

/* Category Selector Dropdown */
.category-selector {
  display: none;
  background: rgba(255, 255, 255, 0.95);
  border-radius: 10px;
  padding: 10px;
  margin-top: 10px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  width: 100%;
}

.category-selector.show {
  display: block;
}

.category-selector label {
  color: #333;
  font-weight: 600;
  display: block;
  margin-bottom: 5px;
  font-size: 12px;
}

.category-selector select {
  width: 100%;
  padding: 8px;
  border-radius: 5px;
  border: 1px solid #ff4fa3;
  margin-bottom: 10px;
  font-family: inherit;
}

.category-selector-buttons {
  display: flex;
  gap: 10px;
}

.category-selector button {
  flex: 1;
  padding: 8px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  font-weight: 600;
  font-size: 12px;
}

.btn-confirm {
  background: linear-gradient(135deg,#ff4fa3,#ff7bbf);
  color: white;
}

.btn-cancel {
  background: #ddd;
  color: #333;
}

/* Category Manager Styles */
.category-manager {
  display: none;
  background: rgba(255, 255, 255, 0.95);
  border-radius: 10px;
  padding: 15px;
  margin-top: 10px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  width: 100%;
  max-width: 300px;
}

.category-manager.show {
  display: block;
}

.category-manager h3 {
  color: #333;
  font-size: 14px;
  margin-bottom: 10px;
  text-align: center;
}

.category-list {
  max-height: 150px;
  overflow-y: auto;
  margin-bottom: 10px;
}

.category-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px;
  background: rgba(255, 79, 163, 0.1);
  border-radius: 5px;
  margin-bottom: 5px;
  color: #333;
  font-size: 13px;
}

.category-item.editing {
  background: rgba(255, 79, 163, 0.2);
}

.category-item input {
  flex: 1;
  padding: 4px;
  border: 1px solid #ff4fa3;
  border-radius: 3px;
  margin-right: 5px;
  font-family: inherit;
}

.category-item .category-actions {
  display: flex;
  gap: 5px;
}

.category-item button {
  background: none;
  border: none;
  cursor: pointer;
  color: #ff4fa3;
  font-size: 12px;
  padding: 2px 5px;
}

.category-item button:hover {
  color: #ff1493;
}

.add-category-section {
  display: flex;
  gap: 5px;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid #ddd;
}

.add-category-section input {
  flex: 1;
  padding: 8px;
  border: 1px solid #ff4fa3;
  border-radius: 5px;
  font-family: inherit;
}

.add-category-section button {
  background: linear-gradient(135deg,#ff4fa3,#ff7bbf);
  color: white;
  border: none;
  padding: 8px 15px;
  border-radius: 5px;
  cursor: pointer;
  font-weight: 600;
}

.close-manager {
  width: 100%;
  margin-top: 10px;
  padding: 8px;
  background: #ddd;
  color: #333;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  font-weight: 600;
}

/* TABLE CONTAINER - Below the control panel */
.table-container {
  display: flex;
  gap: 20px;
  background: var(--glass-bg);
  backdrop-filter: blur(12px);
  padding: 20px;
  margin: 0 auto 30px;
  border-radius: 20px;
  max-width: 1400px;
  overflow-x: auto;
}

/* Custom scrollbar styling - PINK */
.table-container::-webkit-scrollbar {
  height: 12px;
}

.table-container::-webkit-scrollbar-track {
  background: rgba(255, 255, 255, 0.1);
  border-radius: 10px;
}

.table-container::-webkit-scrollbar-thumb {
  background: linear-gradient(135deg, #ff4fa3, #ff7bbf);
  border-radius: 10px;
  border: 2px solid rgba(255, 255, 255, 0.1);
}

.table-container::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(135deg, #ff7bbf, #ffb3d9);
}

/* Firefox scrollbar */
.table-container {
  scrollbar-width: thin;
  scrollbar-color: #ff4fa3 rgba(255, 255, 255, 0.1);
}

/* MIDDLE */
.middle-panel{flex:1; min-width:0;}

/* TABLE - White background with black text */
.table-wrapper {
  overflow-x:auto;
  -webkit-overflow-scrolling: touch;
  border-radius:10px;
  background:#ffffff;
  box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
  min-width:600px;
  background:#ffffff;
  color:#000000;
}

th,td{
  border:1px solid #ddd;
  padding:6px;
  text-align:center;
  color:#000000;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
}

th{
  background:linear-gradient(135deg,#ff4fa3,#ff7bbf);
  position:sticky; top:0;
  color:#ffffff;
  font-weight: 700;
}

/* Day of week header row styling */
.day-of-week-header {
  background: #ffb3d9 !important;
  color: #000000 !important;
  font-size: 11px;
  font-weight: 600;
  padding: 4px;
}

.day-of-week-header.week-2-header {
  background: #ff4fa3 !important;
  color: #ffffff !important;
}

td{
  background:#ffffff;
  color:#000000;
}

/* LEFT ALIGN for Time and Activity columns */
td:nth-child(2), td:nth-child(3) {
  text-align: left;
  padding-left: 10px;
}

th:nth-child(2), th:nth-child(3) {
  text-align: left;
  padding-left: 10px;
}

/* Category Header Row */
.category-header {
  background: linear-gradient(135deg, #ff4fa3, #ff7bbf) !important;
  color: #ffffff !important;
  font-weight: bold;
  text-align: left;
  padding-left: 15px;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* Alternating week colors for checkboxes - Baby pink pastel */
.week-1 input[type="checkbox"]{
  accent-color: #ffb3d9;
}

.week-2 input[type="checkbox"]{
  accent-color: #ff4fa3;
}

/* Week header styling - alternating colors */
.week-1-header {
  background: #ffffff !important;
  color: #000000 !important;
}

.week-2-header {
  background: #ff4fa3 !important;
  color: #ffffff !important;
}

/* Week 3 onwards - vice versa (alternating pattern continues) */
.week-3-header {
  background: #ffffff !important;
  color: #000000 !important;
}

.week-4-header {
  background: #ff4fa3 !important;
  color: #ffffff !important;
}

.week-5-header {
  background: #ffffff !important;
  color: #000000 !important;
}

/* Checkbox styling for baby pink pastel */
.week-1 td input[type="checkbox"]:checked{
  accent-color: #ffb3d9;
}

.week-2 td input[type="checkbox"]:checked{
  accent-color: #ff4fa3;
}

td input[type="checkbox"]{
  width:16px;height:16px;
  cursor:pointer;
}

td input[type="checkbox"]:checked{
  accent-color:var(--pink);
}

.delete-btn {
  cursor:pointer;
  color:#ff4fa3;
  transition:.2s;
  opacity: 0;
  pointer-events: none;
}

.delete-btn.visible {
  opacity: 1;
  pointer-events: auto;
}

.delete-btn:hover{
  color:red;
  transform:scale(1.2);
}

/* Drag Handle - Hidden by default, visible only in edit mode */
.drag-handle {
  cursor: grab;
  color: #999;
  margin-right: 8px;
  font-size: 14px;
  display: none; /* Hidden by default */
}

.drag-handle.visible {
  display: inline-block; /* Show only in edit mode */
}

.drag-handle:active {
  cursor: grabbing;
}

/* Drag and Drop Styles */
tr.routine-row {
  transition: all 0.2s;
}

tr.routine-row.dragging {
  opacity: 0.5;
  background: #ffe6f2;
  box-shadow: 0 2px 8px rgba(255, 79, 163, 0.3);
}

tr.routine-row.drag-over {
  border-top: 3px solid #ff4fa3;
}

tr.routine-row td:first-child {
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
}

/* Save indicator */
.save-indicator {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: rgba(255, 79, 163, 0.9);
  color: white;
  padding: 10px 20px;
  border-radius: 20px;
  font-size: 12px;
  opacity: 0;
  transition: opacity 0.3s;
  z-index: 9999;
  backdrop-filter: blur(10px);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
}

.save-indicator.show {
  opacity: 1;
}

/* ===== MOBILE RESPONSIVE ===== */
@media screen and (max-width: 1024px) {
  .control-panel-container {
    flex-direction: column;
    margin: 15px;
    padding: 15px;
    align-items: center;
  }
  
  .control-left {
    flex-direction: column; /* Stack on mobile */
    align-items: center;
    width: 100%;
  }
  
  .chibi-image {
    max-width: 150px;
  }
  
  .control-right {
    flex-direction: column; /* Stack on mobile */
    align-items: center;
    width: 100%;
    min-width: unset;
  }
  
  .buttons-container {
    width: 100%;
    max-width: 300px;
  }
  
  .progress-container {
    margin-top: 20px;
  }
  
  .table-container {
    flex-direction: column;
    margin: 15px;
    padding: 15px;
  }
  
  #progressChart {
    max-height: 200px !important;
  }
}

@media screen and (max-width: 768px) {
  header {
    padding: 12px 15px;
    flex-wrap: wrap;
    gap: 10px;
  }
  
  .header-left img {
    height: 36px;
  }
  
  .motto {
    font-size: 14px;
    gap: 8px;
  }
  
  .header-icons i {
    font-size: 18px;
    margin-left: 15px;
  }
  
  .routine-title {
    font-size: 24px;
  }
  
  .dgc-btn {
    width: 100%;
    padding: 12px;
    font-size: 14px;
  }
  
  table {
    font-size: 11px;
  }
  
  th, td {
    padding: 4px;
  }
  
  td input[type="checkbox"] {
    width: 14px;
    height: 14px;
  }
  
  .delete-btn {
    opacity: 1;
    pointer-events: auto;
  }
  
  .drag-handle {
    display: none;
  }
}

@media screen and (max-width: 480px) {
  .motto {
    font-size: 12px;
    flex-direction: column;
    gap: 5px;
    text-align: center;
  }
  
  .header-left {
    flex-direction: column;
    gap: 8px;
  }
  
  .calendar-day {
    width: 25px;
    height: 25px;
    font-size: 11px;
  }
  
  .calendar {
    grid-template-columns: repeat(7, 25px);
    gap: 4px;
  }
  
  .weekday-header {
    font-size: 11px;
  }
  
  #monthSelect {
    width: 100%;
  }
  
  #digitalClock {
    font-size: 18px;
  }
  
  .chibi-image {
    width: 120px;
  }
}

/* Touch device optimizations */
@media (hover: none) {
  .delete-btn:hover {
    transform: none;
  }
  
  .delete-btn:active {
    transform: scale(1.2);
    color: red;
  }
  
  .dgc-btn:hover {
    background: linear-gradient(135deg,#ff4fa3,#ff7bbf);
    color: #fff;
    border: none;
  }
  
  .dgc-btn:active {
    background: #fff;
    color: #ff4fa3;
    border: 2px solid #ff4fa3;
  }
}

/* Landscape mode optimization */
@media screen and (max-height: 500px) and (orientation: landscape) {
  .control-panel-container {
    flex-direction: row;
    flex-wrap: wrap;
  }
  
  .control-left {
    flex-direction: row;
  }
  
  .control-left, .control-right {
    flex: 1;
  }
  
  .table-container {
    order: 3;
  }
}
</style>
</head>

<body>

<header>
  <div class="header-left">
    <a href="homepage.html"><img src="adminlogo.png"></a>
    <div class="motto" id="motto"></div>
  </div>
<div class="header-icons">
  <i class="fas fa-house" id="homeBtn"></i>
  <i class="fas fa-music" id="musicBtn"></i>
  <i class="fas fa-right-from-bracket" id="logoutBtn"></i>
</div>

<audio id="bgMusic" src="coffee.mp3"></audio>
</header>

<!-- NEW VERTICAL CONTROL PANEL - Side by side on desktop -->
<div class="control-panel-container">

  <!-- LEFT: Mini Calendar + Chibi side by side -->
  <div class="control-left">
    <div class="calendar-wrapper">
      <div class="calendar" id="miniCalendar"></div>
    </div>
    <img src="animechibli.png" alt="Chibi" class="chibi-image">
  </div>

  <!-- MIDDLE: Title + Digital Time ONLY (centered) -->
  <div class="control-middle">
    <h1 class="routine-title">ROUTINE TRACKER</h1>
    <div id="digitalClock"></div>
  </div>

  <!-- RIGHT: Buttons + Progress side by side -->
  <div class="control-right">
    <!-- Buttons stacked vertically on the left of progress -->
    <div class="buttons-container">
      <div class="button-group">
        <div class="monthly-buttons">
          <select id="monthSelect">
            <option value="1">January</option>
            <option value="2" selected>February</option>
            <option value="3">March</option>
            <option value="4">April</option>
            <option value="5">May</option>
            <option value="6">June</option>
            <option value="7">July</option>
            <option value="8">August</option>
            <option value="9">September</option>
            <option value="10">October</option>
            <option value="11">November</option>
            <option value="12">December</option>
          </select>
        </div>
        
        <button class="dgc-btn" id="addRoutineBtn">
          <i class="fas fa-plus"></i> Add Routine
        </button>
        
        <button class="dgc-btn" id="editAllBtn">
          <i class="fas fa-edit"></i> Edit All
        </button>
        
        <button class="dgc-btn" id="manageCategoriesBtn">
          <i class="fas fa-folder"></i> Categories
        </button>
      </div>

      <!-- Category Selector -->
      <div class="category-selector" id="categorySelector">
        <label>Select Category:</label>
        <select id="categorySelect"></select>
        <div class="category-selector-buttons">
          <button class="btn-confirm" onclick="confirmAddRoutine()">Add</button>
          <button class="btn-cancel" onclick="cancelAddRoutine()">Cancel</button>
        </div>
      </div>
      
      <!-- Category Manager -->
      <div class="category-manager" id="categoryManager">
        <h3>Manage Categories</h3>
        <div class="category-list" id="categoryList"></div>
        <div class="add-category-section">
          <input type="text" id="newCategoryInput" placeholder="New category name...">
          <button onclick="addNewCategory()"><i class="fas fa-plus"></i></button>
        </div>
        <button class="close-manager" onclick="closeCategoryManager()">Close</button>
      </div>
    </div>

    <!-- Monthly Progress Chart - Same size as mini calendar -->
    <div class="progress-container">
      <canvas id="progressChart"></canvas>
    </div>
  </div>

</div>

<!-- TABLE CONTAINER - Below the control panel -->

</div>

<div class="save-indicator" id="saveIndicator">💾 Saved!</div>

<script>

/* ===== MOTTO ===== */
const titles=[
['fas fa-bolt','Alam kong kaya mo yan Julie'],
['fas fa-crown','You are a beautiful QUEEN JULIE'],
['fas fa-money-bill','Yayaman ka Julie'],
['fas fa-heart','I Love you Julie']
];

/* CLOCK */

}

/* MINI CALENDAR (UNCHANGED) */
const miniCal=document.getElementById('miniCalendar');
const monthSelect=document.getElementById('monthSelect');
function renderCalendar(month){
miniCal.innerHTML='';
const year=2026;
const daysInMonth=new Date(year,month,0).getDate();
const firstDay=new Date(year,month-1,1);
let startDay=firstDay.getDay();
startDay=startDay===0?6:startDay-1;
const weekdays=['M','T','W','T','F','S','S'];
weekdays.forEach(day=>{

div.className='weekday-header';
div.innerText=day;
miniCal.appendChild(div);

for(let d=1;d<=daysInMonth;d++){

/* ===== DATA PERSISTENCE ===== */
const STORAGE_KEY = 'queenJulieHabitTracker_v3';
const CATEGORIES_KEY = 'queenJulieCategories_v1';
let habitData = {};
let categories = [];
let chartInstance = null;
let isEditMode = false;
let draggedRow = null;

// Initialize categories
function initCategories() {
  const saved = localStorage.getItem(CATEGORIES_KEY);
  if (saved) {
    categories = JSON.parse(saved);
  } else {
    categories = ['Life', 'Work', 'Gaming'];
    saveCategories();
  }
  updateCategorySelect();
}

function saveCategories() {
  localStorage.setItem(CATEGORIES_KEY, JSON.stringify(categories));
}

function updateCategorySelect() {
  const select = document.getElementById('categorySelect');
  select.innerHTML = '';
  categories.forEach(cat => {
    const option = document.createElement('option');
    option.value = cat;
    option.textContent = cat;
    select.appendChild(option);
  });
}

// Load data from localStorage
function loadData() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    habitData = JSON.parse(saved);
  }
}

// Save data to localStorage
function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(habitData));
  showSaveIndicator();
}

// Show save indicator
function showSaveIndicator() {
  const indicator = document.getElementById('saveIndicator');
  indicator.classList.add('show');
  setTimeout(() => {
    indicator.classList.remove('show');
  }, 2000);
}

// Get current month key
function getMonthKey() {
  return `2026-${monthSelect.value}`;
}

// Get previous month key
function getPreviousMonthKey() {
  const currentMonth = parseInt(monthSelect.value);
  let prevMonth = currentMonth - 1;
  let year = 2026;
  if (prevMonth === 0) {
    prevMonth = 12;
    year = 2025;
  }
  return `${year}-${prevMonth}`;
}

// Carry over data from previous month if current month is empty
function carryOverFromPreviousMonth() {
  const currentKey = getMonthKey();
  const prevKey = getPreviousMonthKey();
  
  if (!habitData[currentKey] || habitData[currentKey].length === 0) {
    if (habitData[prevKey] && habitData[prevKey].length > 0) {
      habitData[currentKey] = JSON.parse(JSON.stringify(habitData[prevKey]));
      saveData();
      return true;
    }
  }
  return false;
}

// Save current table state
function saveCurrentTable() {
  const monthKey = getMonthKey();
  const rows = habitBody.querySelectorAll('tr[data-category]');
  const monthData = [];
  
  rows.forEach(row => {
    const category = row.getAttribute('data-category');
    const time = row.cells[1].innerText;
    const activity = row.cells[2].innerText;
    const checks = [];
    
    const checkboxes = row.querySelectorAll('input[type="checkbox"]');
    checkboxes.forEach(cb => {
      checks.push(cb.checked);
    });
    
    monthData.push({ category, time, activity, checks });
  });
  
  habitData[monthKey] = monthData;
  saveData();
  updateChart();
}

// Load table for specific month
function loadTable(month) {
  const monthKey = `2026-${month}`;
  
  carryOverFromPreviousMonth();
  
  const monthData = habitData[monthKey] || [];
  
  habitBody.innerHTML = '';
  
  const groupedData = {};
  
  categories.forEach(cat => {
    groupedData[cat] = monthData.filter(item => item.category === cat);
  });
  
  categories.forEach(category => {
    const items = groupedData[category];
    if (items && items.length > 0) {
      addCategoryHeader(category);
      items.forEach(data => {
        createRow(data.category, data.time, data.activity, data.checks);
      });
    } else {
      addCategoryHeader(category);
    }
  });
  
  updateDeleteButtonsVisibility();
  updateDragHandlesVisibility();
}

// Add category header
function addCategoryHeader(category) {
  const days = new Date(2026, parseInt(monthSelect.value), 0).getDate();
  const row = document.createElement('tr');
  row.className = 'category-header-row';
  row.innerHTML = `<td colspan="${3 + days}" class="category-header">${category}</td>`;
  habitBody.appendChild(row);
}

// Create a row with data
function createRow(category = 'Life', time = '--:--', activity = 'New Routine', checks = []) {
  const month = parseInt(monthSelect.value);
  const days = new Date(2026, month, 0).getDate();
  
  let row = document.createElement('tr');
  row.setAttribute('draggable', isEditMode); // Only draggable in edit mode
  row.setAttribute('data-category', category);
  row.className = 'routine-row';
  
  row.innerHTML = `
    <td style="display: flex; align-items: center; justify-content: center; gap: 5px;">
      <i class="fas fa-grip-vertical drag-handle ${isEditMode ? 'visible' : ''}"></i>
      <i class="fas fa-trash delete-btn ${isEditMode ? 'visible' : ''}" style="color:#ff4fa3;"></i>
    </td>
    <td contenteditable="${isEditMode}">${time}</td>
    <td contenteditable="${isEditMode}">${activity}</td>
  `;
  
  for(let i = 0; i < days; i++) {
    const isChecked = checks[i] ? 'checked' : '';
    const weekNum = Math.floor(i / 7);
    const weekClass = weekNum % 2 === 0 ? 'week-1' : 'week-2';
    row.innerHTML += `<td class="${weekClass}"><input type="checkbox" ${isChecked}></td>`;
  }
  
  habitBody.appendChild(row);
  
  // Add drag and drop listeners only in edit mode
  if (isEditMode) {
    addDragListeners(row);
  }
  
  // Add delete listener
  const deleteBtn = row.querySelector('.delete-btn');
  if (deleteBtn) {
    deleteBtn.addEventListener('click', function() {
      this.closest('tr').remove();
      saveCurrentTable();
    });
  }
  
  // Add auto-save listeners
  const editableCells = row.querySelectorAll('td[contenteditable="true"]');
  editableCells.forEach(cell => {
    cell.addEventListener('blur', saveCurrentTable);
    cell.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        cell.blur();
      }
    });
  });
  
  const checkboxes = row.querySelectorAll('input[type="checkbox"]');
  checkboxes.forEach(cb => {
    cb.addEventListener('change', saveCurrentTable);
  });
}

// Improved Drag and Drop functionality
function addDragListeners(row) {
  row.addEventListener('dragstart', handleDragStart);
  row.addEventListener('dragend', handleDragEnd);
  row.addEventListener('dragover', handleDragOver);
  row.addEventListener('dragleave', handleDragLeave);
  row.addEventListener('drop', handleDrop);
}

function handleDragStart(e) {
  draggedRow = this;
  this.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', this.getAttribute('data-category'));
  
  // Set drag image (optional, for better visual)
  const rect = this.getBoundingClientRect();
  e.dataTransfer.setDragImage(this, e.clientX - rect.left, e.clientY - rect.top);
}

function handleDragEnd(e) {
  this.classList.remove('dragging');
  
  // Remove all drag-over classes
  document.querySelectorAll('.drag-over').forEach(el => {
    el.classList.remove('drag-over');
  });
  
  draggedRow = null;
  saveCurrentTable();
}

function handleDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  
  if (!draggedRow || this === draggedRow) return;
  
  const targetRow = this.closest('tr');
  if (!targetRow || !targetRow.classList.contains('routine-row')) return;
  
  // Only allow dropping in the same category
  const draggedCategory = draggedRow.getAttribute('data-category');
  const targetCategory = targetRow.getAttribute('data-category');
  
  if (draggedCategory === targetCategory) {
    targetRow.classList.add('drag-over');
    
    const rect = targetRow.getBoundingClientRect();
    const midpoint = rect.top + rect.height / 2;
    
    if (e.clientY < midpoint) {
      targetRow.style.borderTop = '3px solid #ff4fa3';
      targetRow.style.borderBottom = '';
    } else {
      targetRow.style.borderTop = '';
      targetRow.style.borderBottom = '3px solid #ff4fa3';
    }
  }
}

function handleDragLeave(e) {
  this.classList.remove('drag-over');
  this.style.borderTop = '';
  this.style.borderBottom = '';
}

function handleDrop(e) {
  e.preventDefault();
  e.stopPropagation();
  
  if (!draggedRow || this === draggedRow) return;
  
  const targetRow = this.closest('tr');
  if (!targetRow || !targetRow.classList.contains('routine-row')) return;
  
  const draggedCategory = draggedRow.getAttribute('data-category');
  const targetCategory = targetRow.getAttribute('data-category');
  
  if (draggedCategory === targetCategory) {
    const rect = targetRow.getBoundingClientRect();
    const midpoint = rect.top + rect.height / 2;
    
    if (e.clientY < midpoint) {
      targetRow.parentNode.insertBefore(draggedRow, targetRow);
    } else {
      targetRow.parentNode.insertBefore(draggedRow, targetRow.nextSibling);
    }
    
    saveCurrentTable();
  }
  
  // Clean up styles
  document.querySelectorAll('.routine-row').forEach(row => {
    row.classList.remove('drag-over');
    row.style.borderTop = '';
    row.style.borderBottom = '';
  });
}

/* ===== DYNAMIC TABLE ===== */
const habitHead=document.getElementById("habitHead");
const habitBody=document.getElementById("habitBody");
const year=2026;

const daysOfWeek = ['M', 'T', 'W', 'TH', 'F', 'S', 'S'];

function generateTable(month){
habitHead.innerHTML="";
const days=new Date(year,month,0).getDate();

let dayOfWeekRow = `<tr>
<th style="width:40px;"></th>
<th>Time</th>
<th>Activity</th>`;

for(let i=1;i<=days;i++){
  const date = new Date(year, month-1, i);
  let dayIndex = date.getDay();
  dayIndex = dayIndex === 0 ? 6 : dayIndex - 1;
  const dayLetter = daysOfWeek[dayIndex];
  
  const weekNum = Math.floor((i-1) / 7);
  let headerClass;
  if (weekNum % 2 === 0) {
    headerClass = 'day-of-week-header';
  } else {
    headerClass = 'day-of-week-header week-2-header';
  }
  
  dayOfWeekRow += `<th class="${headerClass}">${dayLetter}</th>`;
}
dayOfWeekRow += "</tr>";

let dayNumberRow = `<tr>
<th style="width:40px;"></th>
<th>Date</th>
<th>To Do</th>`;

for(let i=1;i<=days;i++){
  const weekNum = Math.floor((i-1) / 7);
  let headerClass;
  if (weekNum % 2 === 0) {
    headerClass = 'week-1-header';
  } else {
    headerClass = 'week-2-header';
  }
  
  dayNumberRow += `<th class="${headerClass}">${i}</th>`;
}
dayNumberRow += "</tr>";

habitHead.innerHTML = dayOfWeekRow + dayNumberRow;

loadTable(month);
}

generateTable(parseInt(monthSelect.value));

monthSelect.addEventListener("change",()=>{
generateTable(parseInt(monthSelect.value));
updateChart();
});

// Edit All Button functionality
document.getElementById("editAllBtn").addEventListener("click", function() {
  isEditMode = !isEditMode;
  this.classList.toggle('active');
  updateDeleteButtonsVisibility();
  updateDragHandlesVisibility();
  updateContentEditable();
  updateDraggable();
});

function updateDeleteButtonsVisibility() {
  const deleteButtons = document.querySelectorAll('.delete-btn');
  deleteButtons.forEach(btn => {
    if (isEditMode) {
      btn.classList.add('visible');
    } else {
      btn.classList.remove('visible');
    }
  });
}

function updateDragHandlesVisibility() {
  const dragHandles = document.querySelectorAll('.drag-handle');
  dragHandles.forEach(handle => {
    if (isEditMode) {
      handle.classList.add('visible');
    } else {
      handle.classList.remove('visible');
    }
  });
}

function updateContentEditable() {
  const rows = document.querySelectorAll('tr[data-category]');
  rows.forEach(row => {
    const cells = row.querySelectorAll('td[contenteditable]');
    cells.forEach(cell => {
      cell.setAttribute('contenteditable', isEditMode);
    });
  });
}

function updateDraggable() {
  const rows = document.querySelectorAll('tr[data-category]');
  rows.forEach(row => {
    row.setAttribute('draggable', isEditMode);
    if (isEditMode) {
      addDragListeners(row);
    } else {
      row.removeEventListener('dragstart', handleDragStart);
      row.removeEventListener('dragend', handleDragEnd);
      row.removeEventListener('dragover', handleDragOver);
      row.removeEventListener('dragleave', handleDragLeave);
      row.removeEventListener('drop', handleDrop);
    }
  });
}

// Category Selector Functions
document.getElementById("addRoutineBtn").addEventListener("click", function() {
  const selector = document.getElementById('categorySelector');
  selector.classList.toggle('show');
  document.getElementById('categoryManager').classList.remove('show');
});

function confirmAddRoutine() {
  const selectedCategory = document.getElementById('categorySelect').value;
  addRoutineToCategory(selectedCategory);
  document.getElementById('categorySelector').classList.remove('show');
}

function cancelAddRoutine() {
  document.getElementById('categorySelector').classList.remove('show');
}

function addRoutineToCategory(selectedCategory) {
  // Find if category header exists
  const headers = Array.from(habitBody.querySelectorAll('.category-header'));
  let targetHeader = null;
  let nextHeader = null;
  
  for (let i = 0; i < headers.length; i++) {
    if (headers[i].textContent === selectedCategory) {
      targetHeader = headers[i].parentNode;
      // Find next category header (if any)
      if (i + 1 < headers.length) {
        nextHeader = headers[i + 1].parentNode;
      }
      break;
    }
  }
  
  // If header doesn't exist, create it
  if (!targetHeader) {
    addCategoryHeader(selectedCategory);
    createRow(selectedCategory);
    saveCurrentTable();
    return;
  }
  
  // Find the last row of this category
  let lastRowOfCategory = null;
  const allRows = Array.from(habitBody.querySelectorAll('tr'));
  let foundCategory = false;
  
  for (let row of allRows) {
    if (row === targetHeader) {
      foundCategory = true;
      continue;
    }
    if (foundCategory) {
      if (row.classList.contains('category-header-row')) {
        break;
      }
      if (row.getAttribute('data-category') === selectedCategory) {
        lastRowOfCategory = row;
      }
    }
  }
  
  const newRow = createRowElement(selectedCategory);
  
  if (lastRowOfCategory) {
    lastRowOfCategory.after(newRow);
  } else {
    // Insert right after the header
    targetHeader.after(newRow);
  }
  
  saveCurrentTable();
}

function createRowElement(category) {
  const month = parseInt(monthSelect.value);
  const days = new Date(2026, month, 0).getDate();
  
  let row = document.createElement('tr');
  row.setAttribute('draggable', isEditMode);
  row.setAttribute('data-category', category);
  row.className = 'routine-row';
  
  row.innerHTML = `
    <td style="display: flex; align-items: center; justify-content: center; gap: 5px;">
      <i class="fas fa-grip-vertical drag-handle ${isEditMode ? 'visible' : ''}"></i>
      <i class="fas fa-trash delete-btn ${isEditMode ? 'visible' : ''}" style="color:#ff4fa3;"></i>
    </td>
    <td contenteditable="${isEditMode}">--:--</td>
    <td contenteditable="${isEditMode}">New Routine</td>
  `;
  
  for(let i = 0; i < days; i++) {
    const weekNum = Math.floor(i / 7);
    const weekClass = weekNum % 2 === 0 ? 'week-1' : 'week-2';
    row.innerHTML += `<td class="${weekClass}"><input type="checkbox"></td>`;
  }
  
  if (isEditMode) {
    addDragListeners(row);
  }
  
  const deleteBtn = row.querySelector('.delete-btn');
  if (deleteBtn) {
    deleteBtn.addEventListener('click', function() {
      this.closest('tr').remove();
      saveCurrentTable();
    });
  }
  
  const editableCells = row.querySelectorAll('td[contenteditable="true"]');
  editableCells.forEach(cell => {
    cell.addEventListener('blur', saveCurrentTable);
    cell.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        cell.blur();
      }
    });
  });
  
  const checkboxes = row.querySelectorAll('input[type="checkbox"]');
  checkboxes.forEach(cb => {
    cb.addEventListener('change', saveCurrentTable);
  });
  
  return row;
}

/* ===== CATEGORY MANAGEMENT ===== */
document.getElementById("manageCategoriesBtn").addEventListener("click", function() {
  const manager = document.getElementById('categoryManager');
  manager.classList.toggle('show');
  document.getElementById('categorySelector').classList.remove('show');
  renderCategoryList();
});

function renderCategoryList() {
  const list = document.getElementById('categoryList');
  list.innerHTML = '';
  
  categories.forEach((cat, index) => {
    const item = document.createElement('div');
    item.className = 'category-item';
    item.innerHTML = `
      <span class="category-name">${cat}</span>
      <div class="category-actions">
        <button onclick="editCategory(${index})" title="Edit"><i class="fas fa-edit"></i></button>
        <button onclick="deleteCategory(${index})" title="Delete"><i class="fas fa-trash"></i></button>
      </div>
    `;
    list.appendChild(item);
  });
}

function addNewCategory() {
  const input = document.getElementById('newCategoryInput');
  const name = input.value.trim();
  
  if (name && !categories.includes(name)) {
    categories.push(name);
    saveCategories();
    updateCategorySelect();
    renderCategoryList();
    input.value = '';
    
    // Add header for new category in current table
    addCategoryHeader(name);
    showSaveIndicator();
  }
}

function editCategory(index) {
  const list = document.getElementById('categoryList');
  const items = list.querySelectorAll('.category-item');
  const item = items[index];
  const oldName = categories[index];
  
  item.classList.add('editing');
  item.innerHTML = `
    <input type="text" id="editCatInput" value="${oldName}">
    <div class="category-actions">
      <button onclick="saveCategoryEdit(${index})" title="Save"><i class="fas fa-check"></i></button>
      <button onclick="renderCategoryList()" title="Cancel"><i class="fas fa-times"></i></button>
    </div>
  `;
  
  document.getElementById('editCatInput').focus();
  document.getElementById('editCatInput').select();
}

function saveCategoryEdit(index) {
  const input = document.getElementById('editCatInput');
  const newName = input.value.trim();
  const oldName = categories[index];
  
  if (newName && newName !== oldName && !categories.includes(newName)) {
    categories[index] = newName;
    saveCategories();
    updateCategorySelect();
    
    // Update all rows with this category
    const rows = document.querySelectorAll(`tr[data-category="${oldName}"]`);
    rows.forEach(row => {
      row.setAttribute('data-category', newName);
    });
    
    // Update headers
    const headers = document.querySelectorAll('.category-header');
    headers.forEach(header => {
      if (header.textContent === oldName) {
        header.textContent = newName;
      }
    });
    
    saveCurrentTable();
    renderCategoryList();
  }
}

function deleteCategory(index) {
  const catName = categories[index];
  if (confirm(`Delete category "${catName}" and all its routines?`)) {
    categories.splice(index, 1);
    saveCategories();
    updateCategorySelect();
    
    // Remove all rows and headers for this category
    const rows = document.querySelectorAll(`tr[data-category="${catName}"]`);
    rows.forEach(row => row.remove());
    
    const headers = document.querySelectorAll('.category-header');
    headers.forEach(header => {
      if (header.textContent === catName) {
        header.parentNode.remove();
      }
    });
    
    saveCurrentTable();
    renderCategoryList();
  }
}

function closeCategoryManager() {
  document.getElementById('categoryManager').classList.remove('show');
}

/* ===== CHART ===== */
function initChart() {
  const ctx = document.getElementById('progressChart').getContext('2d');
  
  chartInstance = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['Completed', 'Remaining'],
      datasets: [{
        data: [0, 100],
        backgroundColor: ['#ff4fa3', 'rgba(255,255,255,0.2)'],
        borderWidth: 0,
        hoverOffset: 4
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: {
          position: 'bottom',
          labels: {
            color: '#fff',
            font: {
              family: '-apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif',
              size: 10
            }
          }
        },
        title: {
          display: true,
          text: 'Monthly Progress',
          color: '#fff',
          font: {
            family: '-apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif',
            size: 14
          }
        }
      },
      cutout: '60%'
    }
  });
}

function updateChart() {
  if (!chartInstance) return;
  
  const monthKey = getMonthKey();
  const monthData = habitData[monthKey] || [];
  
  let totalTasks = 0;
  let completedTasks = 0;
  
  monthData.forEach(row => {
    row.checks.forEach(checked => {
      totalTasks++;
      if (checked) completedTasks++;
    });
  });
  
  const remaining = totalTasks - completedTasks;
  
  chartInstance.data.datasets[0].data = [completedTasks, Math.max(remaining, 0)];
  chartInstance.update();
}

initChart();
updateChart();
